<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Child Profile Setup</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>
<script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#13a4ec",
            "background-light": "#f6f7f8",
            "background-dark": "#101c22",
          },
          fontFamily: {
            "display": ["Plus Jakarta Sans", "sans-serif"]
          },
          borderRadius: {
            "DEFAULT": "0.5rem",
            "lg": "1rem",
            "xl": "1.5rem",
            "full": "9999px"
          },
        },
      },
    }
  </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display">
<div class="relative flex min-h-screen flex-col items-center justify-center bg-background-light dark:bg-background-dark p-4 sm:p-6" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCO6_xAV4SBV43VceTFFNe-rp0v_R5aayoHytxW9VPo4nx04UPU9A9Gw0Q-UudFbwwNxYmCTgq8LCYJwgAeBx8ei-nprsqnGCjRj3GR_-iYr4Oz9CVVfZcTr0VRIuLQPyI1Cj1fWG_h4guhlKA490FTbM1SEkamnFx7x7ZutXeg4WVJC8HqNVKY_D59DagMKsF6e6M2sYaV90llbYFT5_VrjErA4CiZDam7cjM8D_qOb4E34jMsD3mkFXa4-vliizOcYuxpO61Nj7rZ'); background-repeat: repeat;">
<div class="w-full max-w-2xl rounded-xl bg-white/80 dark:bg-background-dark/80 backdrop-blur-sm shadow-2xl overflow-hidden">
<div class="flex flex-col">
<!-- Progress Bar -->
<div class="p-6 border-b border-gray-200 dark:border-gray-700">
<div class="flex gap-6 justify-between items-center mb-2">
<p class="text-gray-800 dark:text-gray-200 text-sm font-medium">Step 1 of 4</p>
<div class="flex items-center gap-1 text-gray-500 dark:text-gray-400">
<span class="material-symbols-outlined text-base">lock</span>
<span class="text-xs font-medium">Parental Controls</span>
</div>
</div>
<div class="rounded-full bg-gray-200 dark:bg-gray-700">
<div class="h-2 rounded-full bg-primary" style="width: 25%;"></div>
</div>
</div>
<div class="p-6 sm:p-8">
<!-- Page Heading -->
<div class="text-center mb-8">
<p class="text-gray-900 dark:text-white text-3xl sm:text-4xl font-black leading-tight tracking-[-0.033em] font-display">Let's create a profile for your little storyteller!</p>
<p class="text-gray-600 dark:text-gray-300 text-base font-normal leading-normal mt-2">Add your child's information below.</p>
</div>
<!-- Form Fields -->
<div class="space-y-8">
<!-- Name Input -->
<div class="flex flex-col items-center">
<label class="w-full max-w-md">
<p class="text-gray-900 dark:text-white text-lg font-medium leading-normal pb-3 text-center">What's their first name?</p>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-gray-900 dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-gray-300 dark:border-gray-600 bg-white/50 dark:bg-gray-800/50 focus:border-primary h-16 placeholder:text-gray-500 dark:placeholder:text-gray-400 p-4 text-lg font-normal leading-normal text-center" placeholder="e.g., Lily" value=""/>
</label>
</div>
<!-- Age Slider -->
<div class="w-full max-w-md mx-auto">
<div class="relative flex w-full flex-col items-start justify-between gap-4">
<div class="flex w-full items-center justify-between">
<p class="text-gray-900 dark:text-white text-lg font-medium leading-normal">How old are they?</p>
<p class="text-gray-900 dark:text-white text-lg font-bold leading-normal bg-primary/20 dark:bg-primary/30 rounded-lg px-3 py-1">5</p>
</div>
<div class="flex h-4 w-full items-center gap-4">
<div class="flex h-2 flex-1 rounded-full bg-gray-300 dark:bg-gray-600">
<div class="h-full w-[44.44%] rounded-full bg-primary"></div>
<div class="relative">
<div class="absolute -left-2.5 -top-2.5 size-6 rounded-full bg-primary border-4 border-white dark:border-gray-800 shadow-md"></div>
</div>
</div>
</div>
<div class="w-full flex justify-between text-xs text-gray-500 dark:text-gray-400">
<span>3</span>
<span>4</span>
<span>5</span>
<span>6</span>
<span>7</span>
<span>8</span>
</div>
</div>
</div>
</div>
<!-- Button Group -->
<div class="mt-12 pt-6 border-t border-gray-200 dark:border-gray-700">
<div class="flex flex-1 gap-4 flex-wrap justify-between items-center">
<button class="flex min-w-[100px] cursor-pointer items-center justify-center overflow-hidden rounded-xl h-14 px-6 bg-gray-200 dark:bg-gray-700 text-gray-800 dark:text-gray-200 text-base font-bold leading-normal tracking-[0.015em] hover:bg-gray-300 dark:hover:bg-gray-600 transition-colors">
<span class="truncate">Back</span>
</button>
<button class="flex min-w-[100px] flex-1 sm:flex-none sm:min-w-[150px] cursor-pointer items-center justify-center overflow-hidden rounded-xl h-14 px-6 bg-primary text-white text-base font-bold leading-normal tracking-[0.015em] hover:bg-primary/90 transition-transform transform hover:scale-105 shadow-lg shadow-primary/30">
<span class="truncate">Next Step</span>
<span class="material-symbols-outlined ml-2">arrow_forward</span>
</button>
</div>
</div>
</div>
</div>
</div>
</div>
</body></html>
